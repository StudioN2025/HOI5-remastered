<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hearts of Iron V: Remastered</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<!-- МЕНЮ -->
<div id="main-menu" class="fixed inset-0 z-50 flex items-center justify-center bg-cover bg-center"
     style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('assets/hoi5-backend.jpg')">
    <div class="bg-[#e3d1b5] text-black p-8 rounded-lg border-4 border-amber-800 w-[550px] shadow-2xl" style="max-width: 90vw;">
        <h1 class="text-6xl font-black text-center mb-6 border-b-4 border-black/30 pb-4" style="font-size: clamp(32px, 10vw, 60px);">HOI V</h1>
        <p class="text-center text-sm mb-8 italic text-gray-700">Hearts of Iron V: Remastered</p>
        <button id="btn-start" class="w-full bg-gray-800 hover:bg-gray-700 text-white py-4 text-xl font-bold border-2 border-black mb-4 shadow-md transition-all">СТАРТ</button>
        <button id="btn-load-map" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-3 text-lg font-bold border-2 border-black mb-3 transition-all">ЗАГРУЗИТЬ КАРТУ</button>
        <input type="file" id="map-file-input" class="hidden" accept=".json">
        <p class="text-center text-[10px] text-gray-500 mt-6">GitHub Pages Ready</p>
    </div>
</div>

<!-- ВЫБОР СТРАНЫ/КАРТЫ -->
<div id="country-select" class="fixed inset-0 z-40 bg-black/90 hidden items-center justify-center">
    <div class="bg-[#e3d1b5] p-6 rounded-lg border-4 border-amber-800 w-[450px] max-h-[80vh] overflow-auto" style="max-width: 90vw;">
        <h2 class="text-2xl font-bold text-center mb-4 border-b border-black/20 pb-2">ВЫБЕРИТЕ</h2>
        <div id="country-list" class="space-y-2"></div>
        <button id="btn-cancel" class="w-full mt-4 bg-red-800 hover:bg-red-700 text-white py-2 text-sm font-bold rounded">НАЗАД</button>
    </div>
</div>

<!-- ИГРА -->
<div id="game-container">
    <!-- Верхняя панель -->
    <div id="top-bar">
        <span id="country-name" class="font-bold text-yellow-500">—</span>
        <span class="separator">|</span>
        <div class="stat-item">👥 <span id="val-manpower">0</span></div>
        <div class="stat-item">🏭 <span id="val-factories">0</span></div>
        <div class="stat-item">🔫 <span id="val-equipment">0</span></div>
        
        <div class="flex-1"></div>
        
        <div id="research-indicator" class="hidden text-blue-400 text-xs animate-pulse">🔬 ИССЛЕДОВАНИЕ...</div>
        <div id="focus-indicator" class="hidden text-yellow-500 text-xs animate-pulse">⭐ ФОКУС...</div>
        <div id="build-indicator" class="hidden text-emerald-400 text-xs animate-pulse">🏗️ СТРОЙКА...</div>
        
        <div class="speed-buttons">
            <button class="speed-btn" data-speed="0">⏸</button>
            <button class="speed-btn" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="3">3x</button>
            <button class="speed-btn" data-speed="5">5x</button>
        </div>
        
        <span id="game-date" class="date-display">1 ЯНВ 1936</span>
    </div>
    
    <!-- Вкладки -->
    <div id="game-tabs">
        <button class="tab-btn" data-icon="🎖️" onclick="window.openTab('army')">🎖️ АРМИЯ</button>
        <button class="tab-btn" data-icon="🏗️" onclick="window.openTab('build')">🏗️ СТРОЙКА</button>
        <button class="tab-btn" data-icon="🤝" onclick="window.openTab('diplomacy')">🤝 ДИПЛОМАТИЯ</button>
        <button class="tab-btn" data-icon="🔬" onclick="window.openTab('research')">🔬 ТЕХНОЛОГИИ</button>
        <button class="tab-btn" data-icon="⭐" onclick="window.openTab('focus')">⭐ ФОКУСЫ</button>
    </div>
    
    <!-- Окно с контентом -->
    <div id="info-window" class="hidden">
        <div>
            <span id="window-title">ОКНО</span>
            <button id="close-window" onclick="window.closeWindow()">✖</button>
        </div>
        <div id="window-content"></div>
    </div>
    
    <!-- Canvas карты -->
    <canvas id="map-canvas"></canvas>
    
    <!-- Боковая панель информации -->
    <div id="sidebar" class="hidden">
        <div>
            <h3 id="sidebar-title">—</h3>
            <button id="close-sidebar" onclick="document.getElementById('sidebar').classList.add('hidden')">✖</button>
        </div>
        <div id="sidebar-actions"></div>
    </div>
    
    <!-- Подсказки -->
    <div id="hint" class="hidden">
        💡 <span id="hint-text"></span>
    </div>
    
    <!-- Нотификации -->
    <div id="notifications"></div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
