<!DOCTYPE html>
<html>
<head><title>Flag Generator</title></head>
<body>
<h2>Генератор флагов — открой и скачай все</h2>
<div id="status"></div>
<script>
// Все страны с 4 идеологиями
const flags = {
    albania: { base: [189,30,29], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [200,50,30], _neutral: [150,150,150] },
    belgium: { base: [0,0,0], _democratic: [0,0,0], _communist: [200,20,20], _fascist: [120,30,30], _neutral: [150,150,150] },
    bulgaria: { base: [0,80,50], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30], _neutral: [0,80,50] },
    czechoslovakia: { base: [30,100,180], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30], _neutral: [150,150,150] },
    denmark: { base: [200,20,20], _democratic: [200,20,20], _communist: [200,20,20], _fascist: [120,30,30], _neutral: [150,150,150] },
    estonia: { base: [30,100,180], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30], _neutral: [150,150,150] },
    finland: { base: [30,100,180], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30], _neutral: [230,230,230] },
    france: { base: [30,100,180], _neutral: [100,100,100] },
    greece: { base: [30,100,180], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    hungary: { base: [30,130,76], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    iran: { base: [5,150,105], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    iraq: { base: [22,101,52], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    ireland: { base: [22,163,74], _communist: [200,20,20], _neutral: [100,100,100], _fascist: [150,30,30] },
    italy: { base: [22,101,52], _democratic: [30,100,180], _communist: [200,20,20], _neutral: [150,150,150] },
    latvia: { base: [127,29,29], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    lithuania: { base: [6,95,70], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    luxembourg: { base: [103,232,249], _communist: [200,20,20], _neutral: [150,150,150], _fascist: [150,30,30] },
    netherlands: { base: [249,115,22], _communist: [200,20,20], _neutral: [150,150,150], _fascist: [150,30,30] },
    norway: { base: [220,38,38], _communist: [200,20,20], _neutral: [150,150,150], _fascist: [120,30,30] },
    poland: { base: [255,192,203], _democratic: [255,192,203], _communist: [200,20,20], _fascist: [220,38,38] },
    portugal: { base: [16,93,16], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [220,38,38] },
    romania: { base: [245,158,11], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    saudi_arabia: { base: [21,128,61], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    slovakia: { base: [37,99,235], _democratic: [30,100,180], _communist: [200,20,20], _neutral: [150,150,150] },
    spain: { base: [251,191,36], _communist: [200,20,20], _democratic: [30,100,180], _neutral: [150,150,150] },
    sweden: { base: [37,99,235], _communist: [200,20,20], _neutral: [150,150,150], _fascist: [150,30,30] },
    switzerland: { base: [220,38,38], _fascist: [220,38,38], _communist: [200,20,20], _neutral: [150,150,150] },
    turkey: { base: [220,38,38], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
    uk: { base: [30,100,180], _communist: [200,20,20], _neutral: [150,150,150], _fascist: [150,30,30] },
    ussr: { base: [200,20,20], _democratic: [30,100,180], _fascist: [100,0,0], _neutral: [150,150,150] },
    yugoslavia: { base: [30,64,175], _democratic: [30,100,180], _communist: [200,20,20], _fascist: [150,30,30] },
};

// Идеологические узоры
function drawFlag(ctx, w, h, baseColor, ideology) {
    const [r,g,b] = baseColor;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, w, h);

    switch(ideology) {
        case 'communist':
            // Красная звезда в центре
            ctx.fillStyle = '#ff0000';
            drawStar(ctx, w/2, h/2, 5, Math.min(w,h)*0.25, Math.min(w,h)*0.12);
            // Серп и молот (упрощённо)
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(w/2-2, h*0.15, 4, h*0.2);
            ctx.fillRect(w/2+2, h*0.3, 8, 4);
            break;
        case 'fascist':
            // Вертикальная полоса + крест/символ
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(w*0.35, 0, w*0.3, h);
            ctx.fillStyle = `rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`;
            ctx.fillRect(w*0.4, h*0.1, w*0.2, h*0.8);
            break;
        case 'democratic':
            // Горизонтальные полосы (три)
            ctx.fillStyle = `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`;
            ctx.fillRect(0, 0, w, h/3);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, h/3, w, h/3);
            break;
        case 'neutral':
            // Нейтральный — простой триколор
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w/3, h);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(w/3, 0, w/3, h);
            ctx.fillStyle = '#000000';
            ctx.fillRect(w*2/3, 0, w/3, h);
            break;
    }
}

function drawStar(ctx, cx, cy, points, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI / points) - Math.PI / 2;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
}

const W = 48, H = 32;
const status = document.getElementById('status');
let count = 0, total = 0;

for (const [country, data] of Object.entries(flags)) {
    for (const suffix of ['_democratic', '_communist', '_fascist', '_neutral']) {
        const colorKey = suffix;
        if (data[colorKey]) {
            total++;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            drawFlag(ctx, W, H, data[colorKey], suffix.replace('_',''));

            canvas.toBlob(function(blob) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = country + suffix + '.png';
                a.click();
                URL.revokeObjectURL(a.href);
                count++;
                status.textContent = 'Скачано: ' + count + ' / ' + total;
            }, 'image/png');
        }
    }
}

status.textContent = 'Генерация ' + total + ' флагов...';
</script>
</body>
</html>
